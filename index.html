<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <title>Duta Terang - Official Store</title>
</head>
<body>
    <!-- Sticky Header -->
    <header class="sticky-header">
        <div class="logo">Duta Terang</div>
        <input type="search" placeholder="Cari produk...">
        <div class="cart-icon">🛒 <span id="cart-badge">0</span></div>
    </header>

    <!-- Swiper Container -->
    <div class="banner-slider"></div>

    <!-- Product Grid (2, 3, 4 columns) -->
    <main class="product-grid" id="product-container">
        <!-- Card Produk -->
        <div class="product-card">
            <img src="produk.webp" alt="Produk" loading="lazy">
            <h3>Nama Produk</h3>
            <div class="price-tag">Rp 100.000</div>
            <div class="qty-control">
                <button onclick="updateQty(-1)">-</button>
                <span id="qty">0</span>
                <button onclick="updateQty(1)">+</button>
            </div>
        </div>
    </main>
    <!-- Di dalam file index.html Anda -->
<script type="module" src="main.js"></script>
</body>
</html>
